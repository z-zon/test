<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 자동추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>로또 자동추첨기</h1>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="다크모드로 변경">
                <span class="theme-icon" aria-hidden="true">☀</span>
                <span id="theme-label">화이트모드</span>
            </button>
        </header>

        <main>
            <div id="lotto-container" class="lotto-container">
                <div class="placeholder-text">버튼을 눌러 번호를 생성하세요!</div>
            </div>

            <button id="generate-btn" class="generate-btn" type="button">번호 생성하기</button>

            <section class="history-section" aria-labelledby="history-title">
                <h2 id="history-title">최근 생성 기록</h2>
                <div id="history-list" class="history-list">
                    <p class="history-empty">아직 저장된 기록이 없습니다.</p>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
